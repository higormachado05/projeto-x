version: '3.9'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    networks:
      - pjnet
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pj_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__HEContext=Server=sqlserver;Database=ExpenseControl;User Id=sa;Password=YourStrong!Passw0rd;
    ports:
      - "5000:80"
    depends_on:
      - sqlserver
    networks:
      - pjnet

networks:
  pjnet:
    driver: bridge
